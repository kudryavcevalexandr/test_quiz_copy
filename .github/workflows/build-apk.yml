name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Generate Android project
        run: npx expo prebuild --platform android --non-interactive

      - name: Decode keystore (alias: test_app)
        env:
          TEST_APP_KEYSTORE_BASE64: ${{ secrets.TEST_APP_KEYSTORE_BASE64 }}
        run: |
          echo "$TEST_APP_KEYSTORE_BASE64" | base64 --decode > android/app/test_app.jks

      - name: Build release APK
        working-directory: android
        env:
          KEYSTORE_FILE: test_app.jks
          KEYSTORE_ALIAS: test_app
          KEYSTORE_PASSWORD: ${{ secrets.TEST_APP_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.TEST_APP_KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$KEYSTORE_FILE \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEYSTORE_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: test_app-apk
          path: android/app/build/outputs/apk/release/app-release.apk
