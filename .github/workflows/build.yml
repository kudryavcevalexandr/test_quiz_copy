name: Build Android Release APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  JAVA_VERSION: '17'
  KEYSTORE_PATH: android/app/release.keystore
  KEYSTORE_ALIAS: release
  KEYSTORE_PASSWORD: changeit123
  KEY_PASSWORD: changeit123

jobs:
  build-release-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Generate Android project
        run: npx expo prebuild --platform android --non-interactive

      - name: Generate release keystore
        run: |
          keytool -genkeypair \
            -v \
            -storetype PKCS12 \
            -keystore "$KEYSTORE_PATH" \
            -alias "$KEYSTORE_ALIAS" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "$KEYSTORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            -dname "CN=GitHub Actions, OU=Mobile, O=Automation, L=Remote, S=Remote, C=US"

      - name: Resolve JS entry file
        id: resolve_entry
        shell: bash
        run: |
          set -euo pipefail

          PACKAGE_MAIN=$(node -p "require('./package.json').main || ''")
          PACKAGE_MAIN="${PACKAGE_MAIN#./}"

          CANDIDATES=()
          if [[ -n "$PACKAGE_MAIN" ]]; then
            CANDIDATES+=("$PACKAGE_MAIN")
          fi
          CANDIDATES+=("index.js" "index.ts" "index.tsx" "expo/AppEntry.js" "App.js" "App.tsx")

          ENTRY_FILE=""
          for candidate in "${CANDIDATES[@]}"; do
            candidate="${candidate#./}"
            if [[ -f "$candidate" ]]; then
              ENTRY_FILE="$candidate"
              break
            fi
          done

          if [[ -z "$ENTRY_FILE" ]]; then
            echo "❌ Could not resolve a valid JS entry file."
            echo "Checked candidates (in order): ${CANDIDATES[*]}"
            echo "Tip: set a valid \"main\" field in package.json or add one of the common entry files."
            exit 1
          fi

          echo "✅ Resolved entry file: $ENTRY_FILE"
          echo "entry_file=$ENTRY_FILE" >> "$GITHUB_OUTPUT"

      - name: Validate resolved JS entry file exists
        shell: bash
        run: |
          set -euo pipefail

          ENTRY_FILE="${{ steps.resolve_entry.outputs.entry_file }}"

          if [[ -z "$ENTRY_FILE" ]]; then
            echo "❌ Entry file output was empty."
            exit 1
          fi

          if [[ ! -f "$ENTRY_FILE" ]]; then
            echo "❌ Entry file does not exist: $ENTRY_FILE"
            echo "This check fails early to avoid Metro Bundler resolution errors."
            exit 1
          fi

          echo "✅ Entry file exists: $ENTRY_FILE"

      - name: Generate Android JS bundle
        run: |
          mkdir -p android/app/src/main/assets
          npx expo export:embed --platform android --dev false --entry-file "${{ steps.resolve_entry.outputs.entry_file }}" --bundle-output android/app/src/main/assets/index.android.bundle --assets-dest android/app/src/main/res

      - name: Clean Gradle cache after bundle generation
        working-directory: android
        run: ./gradlew clean

      - name: Build release APK
        working-directory: android
        env:
          RELEASE_STORE_FILE: release.keystore
          RELEASE_STORE_PASSWORD: ${{ env.KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ env.KEYSTORE_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ env.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
