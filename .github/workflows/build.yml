# Собирает production APK для React Native / Expo bare проекта.
name: Build Android Release APK

on:
  # Запускаем сборку при пуше в основную ветку.
  push:
    branches:
      - main
  # Оставляем ручной запуск из интерфейса GitHub Actions.
  workflow_dispatch:
    inputs:
      project-dir:
        description: 'React Native/Expo project directory relative to the repository root.'
        required: false
        default: '.'
      android-dir:
        description: 'Android native project directory relative to the repository root. Leave empty to use <project-dir>/android.'
        required: false
        default: ''

env:
  # Node.js 18+ требуется современным версиям React Native / Expo.
  NODE_VERSION: '20'
  # Android Gradle Plugin для RN 0.79 корректно работает с JDK 17.
  JAVA_VERSION: '17'
  # Значения по умолчанию для push-сборок; workflow_dispatch может переопределить их inputs выше.
  # Для монорепозитория задайте PROJECT_DIR: apps/mobile, а ANDROID_DIR оставьте пустым
  # или укажите явный путь вроде apps/mobile/android.
  PROJECT_DIR: .
  ANDROID_DIR: ''
  # Фиксируем package name, который должен попасть в сгенерированный Android-проект.
  ANDROID_PACKAGE_NAME: com.anonymous.blockordergame
  # Собираем только release-вариант, чтобы Gradle выполнил bundleReleaseJsAndAssets.
  GRADLE_TASK: :app:assembleRelease
  # Включаем обязательный 64-bit ABI для реальных устройств; оставляем популярные ABI для совместимости.
  ANDROID_ABIS: armeabi-v7a,arm64-v8a,x86,x86_64
  # Временный CI keystore нужен только чтобы получить устанавливаемый release APK как артефакт.
  KEYSTORE_ALIAS: github-actions-release
  KEYSTORE_PASSWORD: changeit123
  KEY_PASSWORD: changeit123

jobs:
  build-release-apk:
    # Сборка Android выполняется на Linux runner.
    runs-on: ubuntu-latest

    steps:
      # Забираем исходный код репозитория.
      - name: Checkout repository
        uses: actions/checkout@v4


      # Нормализуем PROJECT_DIR/ANDROID_DIR один раз, чтобы все последующие шаги
      # использовали одинаковые пути относительно корня репозитория.
      - name: Resolve build directories
        id: paths
        shell: bash
        env:
          PROJECT_DIR_INPUT: ${{ inputs['project-dir'] || env.PROJECT_DIR }}
          ANDROID_DIR_INPUT: ${{ inputs['android-dir'] || env.ANDROID_DIR }}
        run: |
          set -euo pipefail
          workspace="${GITHUB_WORKSPACE:-$PWD}"

          resolve_under_workspace() {
            local input="$1"
            local fallback="$2"
            local label="$3"
            local value="${input:-$fallback}"
            local abs

            if [[ "$value" = /* ]]; then
              abs=$(realpath -m "$value")
            else
              abs=$(realpath -m "$workspace/$value")
            fi

            case "$abs" in
              "$workspace"|"$workspace"/*) ;;
              *)
                echo "$label must stay inside the repository workspace: $value" >&2
                exit 1
                ;;
            esac

            realpath -m --relative-to="$workspace" "$abs"
          }

          project_dir=$(resolve_under_workspace "$PROJECT_DIR_INPUT" "." "PROJECT_DIR")
          if [[ "$project_dir" == "." ]]; then
            default_android_dir="android"
          else
            default_android_dir="$project_dir/android"
          fi
          android_dir=$(resolve_under_workspace "$ANDROID_DIR_INPUT" "$default_android_dir" "ANDROID_DIR")
          android_from_project=$(realpath -m --relative-to="$workspace/$project_dir" "$workspace/$android_dir")

          echo "project_dir=$project_dir" >> "$GITHUB_OUTPUT"
          echo "android_dir=$android_dir" >> "$GITHUB_OUTPUT"
          echo "android_from_project=$android_from_project" >> "$GITHUB_OUTPUT"
          echo "package_lock=$project_dir/package-lock.json" >> "$GITHUB_OUTPUT"
          echo "yarn_lock=$project_dir/yarn.lock" >> "$GITHUB_OUTPUT"

          echo "Project directory: $project_dir"
          echo "Android directory: $android_dir"
          echo "Android path from project directory: $android_from_project"

      # Определяем пакетный менеджер, чтобы корректно установить зависимости и кэшировать npm/yarn.
      - name: Detect JavaScript package manager
        id: package_manager
        shell: bash
        run: |
          set -euo pipefail
          PROJECT_DIR="${{ steps.paths.outputs.project_dir }}"
          if [[ ! -f "$PROJECT_DIR/package.json" ]]; then
            echo "package.json was not found in $PROJECT_DIR. Set project-dir/PROJECT_DIR to the React Native or Expo app directory." >&2
            exit 1
          fi
          if [[ -f "$PROJECT_DIR/yarn.lock" ]]; then
            echo "manager=yarn" >> "$GITHUB_OUTPUT"
            echo "cache=yarn" >> "$GITHUB_OUTPUT"
            echo "install_command=yarn install --frozen-lockfile" >> "$GITHUB_OUTPUT"
            echo "lockfile=$PROJECT_DIR/yarn.lock" >> "$GITHUB_OUTPUT"
          else
            echo "manager=npm" >> "$GITHUB_OUTPUT"
            echo "cache=npm" >> "$GITHUB_OUTPUT"
            echo "install_command=npm ci" >> "$GITHUB_OUTPUT"
            echo "lockfile=$PROJECT_DIR/package-lock.json" >> "$GITHUB_OUTPUT"
          fi

      # Устанавливаем Node.js и включаем встроенный кэш npm/yarn по lock-файлу.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: ${{ steps.package_manager.outputs.cache }}
          cache-dependency-path: ${{ steps.package_manager.outputs.lockfile }}

      # Включаем Corepack для воспроизводимых установок Yarn, если проект использует yarn.lock.
      - name: Enable Corepack for Yarn
        if: steps.package_manager.outputs.manager == 'yarn'
        run: corepack enable

      # Устанавливаем JDK 17 и включаем Gradle cache через setup-java.
      - name: Setup Java 17 with Gradle cache
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      # Дополнительно кэшируем wrapper/caches Gradle для ускорения повторных сборок.
      - name: Cache Gradle directories
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles(format('{0}/**/*.gradle*', steps.paths.outputs.android_dir), format('{0}/**/gradle-wrapper.properties', steps.paths.outputs.android_dir), steps.package_manager.outputs.lockfile) }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # Устанавливаем JS-зависимости строго по lock-файлу.
      - name: Install JavaScript dependencies
        working-directory: ${{ steps.paths.outputs.project_dir }}
        run: ${{ steps.package_manager.outputs.install_command }}

      # React Native 0.79 ожидает отдельный CLI пакет для команды bundle.
      - name: Ensure React Native CLI is available
        working-directory: ${{ steps.paths.outputs.project_dir }}
        shell: bash
        run: |
          set -euo pipefail
          if ! node -e "require.resolve('@react-native-community/cli/package.json')" >/dev/null 2>&1; then
            npm install --no-save --no-package-lock @react-native-community/cli@latest
          fi

      # Expo-проекты часто не хранят gradlew в Git; генерируем android/gradlew, если это стандартный путь проекта.
      - name: Ensure Android native project exists
        shell: bash
        env:
          PROJECT_DIR: ${{ steps.paths.outputs.project_dir }}
          ANDROID_DIR: ${{ steps.paths.outputs.android_dir }}
          ANDROID_FROM_PROJECT: ${{ steps.paths.outputs.android_from_project }}
        run: |
          set -euo pipefail
          if [[ ! -f "$ANDROID_DIR/gradlew" && "$ANDROID_FROM_PROJECT" == "android" ]]; then
            if (cd "$PROJECT_DIR" && node -e "const p=require('./package.json'); process.exit(p.dependencies?.expo || p.devDependencies?.expo ? 0 : 1)"); then
              echo "$ANDROID_DIR/gradlew was not found; generating the native Android project with Expo prebuild."
              (cd "$PROJECT_DIR" && npx expo prebuild --platform android --no-install)
            fi
          fi

          if [[ ! -f "$ANDROID_DIR/gradlew" ]]; then
            echo "$ANDROID_DIR/gradlew was not found. Set project-dir/PROJECT_DIR and android-dir/ANDROID_DIR to the correct monorepo paths, or commit the native Android project generated by React Native CLI before building remotely." >&2
            exit 1
          fi

      # Проверяем package name/applicationId перед сборкой, чтобы APK собирался как com.anonymous.blockordergame.
      - name: Ensure Android package name
        shell: bash
        env:
          ANDROID_DIR: ${{ steps.paths.outputs.android_dir }}
        run: |
          set -euo pipefail
          BUILD_GRADLE="${ANDROID_DIR}/app/build.gradle"
          if ! grep -q "applicationId[[:space:]]*['\"]${ANDROID_PACKAGE_NAME}['\"]" "$BUILD_GRADLE"; then
            sed -i -E "s/applicationId[[:space:]]+['\"][^'\"]+['\"]/applicationId \"${ANDROID_PACKAGE_NAME}\"/" "$BUILD_GRADLE"
          fi
          if grep -q "namespace[[:space:]]*['\"]" "$BUILD_GRADLE"; then
            sed -i -E "s/namespace[[:space:]]+['\"][^'\"]+['\"]/namespace \"${ANDROID_PACKAGE_NAME}\"/" "$BUILD_GRADLE"
          fi
          grep -nE "namespace|applicationId" "$BUILD_GRADLE" || true

      # Гарантируем наличие arm64-v8a и остальных ABI, чтобы избежать конфликтов линковки native/Hermes .so на 64-bit устройствах.
      - name: Ensure Android ABI filters include arm64-v8a
        shell: bash
        env:
          ANDROID_DIR: ${{ steps.paths.outputs.android_dir }}
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path
          import os
          import re

          path = Path(os.environ['ANDROID_DIR']) / 'app/build.gradle'
          text = path.read_text()
          abis = [abi.strip() for abi in os.environ['ANDROID_ABIS'].split(',') if abi.strip()]
          abi_line = 'abiFilters ' + ', '.join(f'"{abi}"' for abi in abis)

          if 'abiFilters' in text:
              text = re.sub(r'abiFilters\s+[^\n]+', abi_line, text)
          else:
              default_config = re.search(r'(defaultConfig\s*\{)', text)
              if not default_config:
                  raise SystemExit('defaultConfig block was not found in android/app/build.gradle')
              insert = default_config.group(1) + '\n        ndk {\n            ' + abi_line + '\n        }'
              text = text[:default_config.start(1)] + insert + text[default_config.end(1):]

          if 'arm64-v8a' not in text:
              raise SystemExit('arm64-v8a ABI was not added to android/app/build.gradle')

          path.write_text(text)
          PY
          grep -n "abiFilters" "${ANDROID_DIR}/app/build.gradle"

      # КРИТИЧЕСКИ ВАЖНО: заранее кладём production JS bundle в assets APK.
      - name: Bundle JavaScript into Android assets
        working-directory: ${{ steps.paths.outputs.project_dir }}
        shell: bash
        run: |
          set -euo pipefail
          ANDROID_FROM_PROJECT="${{ steps.paths.outputs.android_from_project }}"
          mkdir -p "$ANDROID_FROM_PROJECT/app/src/main/assets"
          mkdir -p "$ANDROID_FROM_PROJECT/app/src/main/res"
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output "$ANDROID_FROM_PROJECT/app/src/main/assets/index.android.bundle" \
            --assets-dest "$ANDROID_FROM_PROJECT/app/src/main/res"
          test -s "$ANDROID_FROM_PROJECT/app/src/main/assets/index.android.bundle"

      # Выдаём Gradle wrapper права на выполнение перед clean/build.
      - name: Make Gradle wrapper executable
        run: chmod +x "${{ steps.paths.outputs.android_dir }}/gradlew"

      # Создаём временный release keystore для CI-сборки APK.
      - name: Generate CI release keystore
        env:
          KEYSTORE_PATH: ${{ steps.paths.outputs.android_dir }}/app/release.keystore
        run: |
          mkdir -p "$(dirname "$KEYSTORE_PATH")"
          keytool -genkeypair \
            -v \
            -storetype PKCS12 \
            -keystore "$KEYSTORE_PATH" \
            -alias "$KEYSTORE_ALIAS" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "$KEYSTORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            -dname "CN=GitHub Actions, OU=Mobile, O=Automation, L=Remote, S=Remote, C=US"

      # Очищаем Android build directory перед основной release-сборкой.
      - name: Clean Android Gradle project
        working-directory: ${{ steps.paths.outputs.android_dir }}
        run: ./gradlew clean --no-daemon

      # Собираем один универсальный Release APK; JS bundle уже принудительно создан предыдущим шагом.
      - name: Build Android release universal APK
        working-directory: ${{ steps.paths.outputs.android_dir }}
        env:
          RELEASE_STORE_FILE: release.keystore
          RELEASE_STORE_PASSWORD: ${{ env.KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ env.KEYSTORE_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ env.KEY_PASSWORD }}
        run: ./gradlew ${{ env.GRADLE_TASK }} --no-daemon

      # Находим итоговый release APK независимо от имени signed/unsigned файла.
      - name: Locate release APK
        id: apk
        shell: bash
        env:
          ANDROID_DIR: ${{ steps.paths.outputs.android_dir }}
        run: |
          set -euo pipefail
          APK_PATH=$(find "${ANDROID_DIR}/app/build/outputs/apk/release" -type f -name '*.apk' | sort | tail -n 1)
          if [[ -z "$APK_PATH" ]]; then
            echo "No release APK was found."
            exit 1
          fi
          echo "path=$APK_PATH" >> "$GITHUB_OUTPUT"
          echo "Found APK: $APK_PATH"
          unzip -l "$APK_PATH" | grep -q "assets/index.android.bundle"
          unzip -l "$APK_PATH" | grep -Eq "lib/(armeabi-v7a|arm64-v8a|x86|x86_64)/"

      # Загружаем готовый APK как артефакт GitHub Actions.
      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: blockordergame-release-apk
          path: ${{ steps.apk.outputs.path }}
          if-no-files-found: error
