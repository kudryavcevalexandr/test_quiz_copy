plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    id "com.facebook.react"
}

/**
 * React Native Android application configuration.
 *
 * The CI pipeline also runs an explicit `react-native bundle` command before
 * Gradle. Keeping bundleCommand as `bundle` here makes the Gradle-generated
 * release assets compatible with the pre-bundled index.android.bundle.
 */
react {
    bundleCommand = "bundle"
    autolinkLibrariesWithApp()
}

def enableProguardInReleaseBuilds = false

def jscFlavor = 'io.github.react-native-community:jsc-android:2026004.+'

def universalAbis = ["armeabi-v7a", "arm64-v8a", "x86", "x86_64"]
def isHermesEnabled = (project.findProperty("hermesEnabled") ?: "true").toBoolean()

def reactNativeArchitectures() {
    def value = project.findProperty("reactNativeArchitectures")
    return value ? value.split(",").collect { it.trim() }.findAll { it } : null
}

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.anonymous.blockordergame"

    defaultConfig {
        applicationId "com.anonymous.blockordergame"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"

        ndk {
            abiFilters(*(reactNativeArchitectures() ?: universalAbis))
        }
    }

    /**
     * Critical for remote APK testing on an unknown physical Android device:
     * disable per-ABI split APKs and build one universal APK containing all
     * common React Native native-library ABIs.
     */
    splits {
        abi {
            enable false
            reset()
            include(*universalAbis)
            universalApk true
        }
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
            if (project.hasProperty('RELEASE_STORE_FILE') || System.getenv('RELEASE_STORE_FILE')) {
                storeFile file(project.findProperty('RELEASE_STORE_FILE') ?: System.getenv('RELEASE_STORE_FILE'))
                storePassword project.findProperty('RELEASE_STORE_PASSWORD') ?: System.getenv('RELEASE_STORE_PASSWORD')
                keyAlias project.findProperty('RELEASE_KEY_ALIAS') ?: System.getenv('RELEASE_KEY_ALIAS')
                keyPassword project.findProperty('RELEASE_KEY_PASSWORD') ?: System.getenv('RELEASE_KEY_PASSWORD')
            } else {
                storeFile signingConfigs.debug.storeFile
                storePassword signingConfigs.debug.storePassword
                keyAlias signingConfigs.debug.keyAlias
                keyPassword signingConfigs.debug.keyPassword
            }
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.release
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }
}

dependencies {
    implementation("com.facebook.react:react-android")

    if (isHermesEnabled) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}
